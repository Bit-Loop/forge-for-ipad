schema = 1
id = "rust"
label = "Rust workstation"
version = "1"
seed = true
depends = ["core", "cpp"]

[packages]
apt = ["libssl-dev", "mold", "sccache"]
pacman = ["mold", "openssl", "sccache"]

[rustup]
source = "rustup-init-1.29.0-aarch64"
profile = "minimal"
default_toolchain = "stable"
components = ["clippy", "llvm-tools-preview", "rust-analyzer", "rust-src", "rustfmt"]
targets = ["aarch64-unknown-linux-gnu", "wasm32-wasip1"]
edge_toolchain = "nightly"

[cargo_tools]
packages = [
  "cargo-audit", "cargo-binstall", "cargo-deny", "cargo-edit", "cargo-llvm-cov",
  "cargo-nextest", "cargo-watch"
]
